name: Build and Push to Amazon ECR

on:
  push:
    branches:
      - main # Triggers the pipeline automatically when code changes hit the main branch

jobs:
  deploy:
    name: Build & Publish Image
    runs-on: ubuntu-latest

    steps:
    # 1. Pull your application source code down into the GitHub virtual runner
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Authenticate securely into your AWS account using secrets
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    # 3. Securely log your runner machine into your Amazon ECR Registry
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4. Automate building, tagging, and uploading your Docker image
    - name: Compile and Push Docker Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: wgu-portfolio-app
        IMAGE_TAG: latest
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
